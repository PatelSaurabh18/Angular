<section id="task">
  <header>
    <h2>{{name}}'s Tasks!</h2>
    <menu>
      <button>Add Task</button>
    </menu>
  </header>

  <ul>
    @if (selectedUserTasks.length === 0) {
      <h1>User doesn't have any tasks!</h1>
    } @else {
      @for (dummyTask of selectedUserTasks; track dummyTask.id) {
        <li>
          <app-task [userTaskObjs]="dummyTask"  (completeClick)="onCompleteClickEvent($event)"></app-task>
        </li>
      }
    }
  </ul>
</section>
