<div class="backdrop" (click)="onCancelClick()">

    <dialog  open (click)="$event.stopPropagation()">
  <h2>Add New Task</h2>
  
  <!-- (ngSubmit) automatically prevents the browser page from reloading -->
  <form (ngSubmit)="onSubmitForm()">
    <p>
      <label for="title">Title</label>
      <input type="text" id="title" [(ngModel)]="enteredTitle" name="title" required />
    </p>
    <p>
      <label for="summary">Summary</label>
      <textarea id="summary" rows="4" [(ngModel)]="enteredSummary" name="summary" required></textarea>
    </p>
    <p>
      <label for="date">Due Date</label>
      <input type="date" id="date" [(ngModel)]="enteredDueDate" name="date" required />
    </p>

    <div class="actions">
      <button type="button" (click)="onCancelClick()">Cancel</button>
      <button type="submit">Create Task</button>
    </div>
  </form>
</dialog>
    
</div>
